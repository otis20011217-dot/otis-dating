<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特別的邀請 ❤️</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #fff5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        h1 { color: #ff4d6d; margin-bottom: 20px; }
        p { color: #555; line-height: 1.6; }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            height: 50px;
        }

        button {
            padding: 10px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-yes { background-color: #ff4d6d; color: white; }
        .btn-yes:hover { background-color: #ff758f; transform: scale(1.1); }

        .btn-no {
            background-color: #ddd;
            color: #777;
            position: absolute;
        }

        .hidden { display: none; }

        input[type="text"] {
            padding: 10px;
            width: 80%;
            border: 2px solid #ffb3c1;
            border-radius: 10px;
            margin-top: 10px;
            outline: none;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- 第一階段：詢問約會 -->
    <div id="step1" class="card">
        <h1>❤️ Hi! ❤️</h1>
        <p>我有個重要的問題想問你...</p>
        <h2>你願意跟我去約會嗎？</h2>
        <div class="btn-container">
            <button class="btn-yes" onclick="nextStep(2)">好呀！</button>
            <button class="btn-no" id="noBtn" onmouseover="moveButton()">不要</button>
        </div>
    </div>

    <!-- 第二階段：詢問活動 -->
    <div id="step2" class="card hidden">
        <h1>太棒了！✨</h1>
        <p>那天我們要做什麼呢？</p>
        <div class="btn-container" style="flex-direction: column; height: auto;">
            <button class="btn-yes" onclick="setActivity('看電影', 3)">🎬 來一場浪漫電影</button>
            <button class="btn-yes" style="background-color: #ff85a1;" onclick="setActivity('逛街', 3)">🛍️ 開心地逛街</button>
        </div>
    </div>

    <!-- 第三階段：詢問餐廳 -->
    <div id="step3" class="card hidden">
        <h1>肚子餓了... 😋</h1>
        <p>你想去哪間餐廳吃飯？</p>
        <input type="text" id="restaurantInput" placeholder="輸入餐廳名稱...">
        <div class="btn-container">
            <button class="btn-yes" onclick="finish()">決定好了！</button>
        </div>
    </div>

    <!-- 最終結果 -->
    <div id="step4" class="card hidden">
        <h1>約定好了喔！🌹</h1>
        <div id="summary" style="text-align: left; background: #fff0f3; padding: 15px; border-radius: 10px;">
            <!-- 結果會顯示在這裡 -->
        </div>
        <p style="margin-top: 20px;">截圖傳給我，不准賴皮！😜</p>
    </div>

    <script>
        let selection = {
            activity: '',
            restaurant: ''
        };

        // 讓「不要」按鈕逃跑的函式
        function moveButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // 切換步驟
        function nextStep(step) {
            document.querySelectorAll('.card').forEach(card => card.classList.add('hidden'));
            const nextCard = document.getElementById('step' + step);
            nextCard.classList.remove('hidden');
            nextCard.classList.add('fade-in');
        }

        // 儲存活動
        function setActivity(act, step) {
            selection.activity = act;
            nextStep(step);
        }

        // 完成，顯示總結
        function finish() {
            const rest = document.getElementById('restaurantInput').value;
            if(!rest) {
                alert("請填寫想吃的餐廳名稱嘛～");
                return;
            }
            selection.restaurant = rest;
            
            const summaryHTML = `
                <p>📍 <strong>活動：</strong> ${selection.activity}</p>
                <p>🍴 <strong>餐廳：</strong> ${selection.restaurant}</p>
                <p>⏰ <strong>時間：</strong> 另行討論（你說了算！）</p>
            `;
            document.getElementById('summary').innerHTML = summaryHTML;
            nextStep(4);
        }
    </script>
</body>
</html>
